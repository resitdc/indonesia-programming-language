name: Build RPL Studio APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build-apk:
    name: 📦 Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android, i686-linux-android

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Get Flutter dependencies
        working-directory: apps/studio
        run: flutter pub get

      - name: 🏗️ Build APK
        working-directory: apps/studio
        run: flutter build apk --release

      - name: 🏷️ Get App Version and Rename
        working-directory: apps/studio
        run: |
          APP_VERSION=$(grep '^version: ' pubspec.yaml | head -n 1 | awk '{print $2}' | cut -d '+' -f 1)
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
          cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/RPL-Studio-v${APP_VERSION}.apk

      - name: 📤 Upload to Google Drive
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ secrets.GDRIVE_CREDENTIALS }}
          filename: apps/studio/build/app/outputs/flutter-apk/RPL-Studio-v${{ env.APP_VERSION }}.apk
          folderId: ${{ secrets.ANDROID_GDRIVE_FOLDER_ID }}
          overwrite: "true"

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpl-studio-apk
          path: apps/studio/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
